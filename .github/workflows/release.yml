name: Build & Release

on:
  push:
    branches:
      - prod

# 동시에 여러 빌드가 실행되지 않도록 제한
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_pattern: dist/*.dmg
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_pattern: dist/*-setup.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "AI 투자 솔루션 - Latest" \
            --notes "최신 빌드 ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --latest \
            artifacts/*
