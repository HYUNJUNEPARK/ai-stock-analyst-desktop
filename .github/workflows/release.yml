# prod 브랜치에 push 하면 macOS(.dmg)와 Windows(.exe) 인스톨러를 빌드하고
# GitHub Releases의 "latest" 태그에 업로드하는 워크플로우
#
# 고정 다운로드 URL:
#   - https://github.com/HYUNJUNEPARK/ai-stock-analyst-desktop/releases/latest/download/ai-stock-analytics-setup-mac.dmg
#   - https://github.com/HYUNJUNEPARK/ai-stock-analyst-desktop/releases/latest/download/ai-stock-analytics-setup-windows.exe

name: Build & Release

on:
  push:
    branches:
      - prod

# 동시에 여러 빌드가 실행되지 않도록 제한 (새 push가 들어오면 기존 빌드 취소)
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # 1단계: macOS / Windows 병렬 빌드
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_pattern: dist/*-setup-mac.dmg
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_pattern: dist/*-setup-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builder는 GH_TOKEN을 참조하여 코드 서명/notarize 등에 활용
      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 빌드 결과물을 임시 artifact로 업로드 (release job에서 다운로드하여 사용)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          retention-days: 1

  # 2단계: 빌드 결과물을 GitHub Releases에 업로드
  release:
    needs: build # build job이 모두 성공해야 실행
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release 생성/삭제 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # package.json에서 버전 정보를 읽어 환경변수로 저장
      - name: Read version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # 양쪽 OS 빌드 결과물을 하나의 폴더로 다운로드
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      # 기존 "latest" Release와 태그를 삭제 (없으면 무시)
      # 이렇게 해야 동일한 "latest" 태그로 새 Release를 만들 수 있음
      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

      # 새 "latest" Release 생성 + .dmg, .exe 파일 첨부
      # 파일명에 버전이 없으므로 다운로드 URL이 항상 동일하게 유지됨
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "다운로드 (v${{ steps.version.outputs.VERSION }})" \
            --latest \
            artifacts/*
